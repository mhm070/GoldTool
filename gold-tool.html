<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gold Tool</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold:        #C9A84C;
    --gold-light:  #E8C97A;
    --gold-dim:    #8A6E30;
    --rose:        #E05C7A;
    --rose-light:  #F07A95;
    --rose-dim:    #7A2D42;
    --violet:      #7C5CBF;
    --violet-light:#A07FD8;
    --bg:          #0D0D10;
    --surface:     #141418;
    --surface2:    #1A1A20;
    --border:      #242430;
    --border2:     #2E2E3C;
    --text:        #E8E8F0;
    --text-muted:  #7A7A90;
    --text-dim:    #4A4A60;
    --success:     #4CAF82;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    min-height: 100vh;
    font-family: 'Inter', 'DM Sans', sans-serif;
    color: var(--text);
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Subtle radial glow background ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 15% 10%, rgba(201,168,76,.06) 0%, transparent 70%),
      radial-gradient(ellipse 50% 60% at 85% 85%, rgba(124,92,191,.05) 0%, transparent 70%),
      radial-gradient(ellipse 40% 40% at 50% 50%, rgba(224,92,122,.03) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }

  /* ── Subtle dot grid ── */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,.025) 1px, transparent 1px);
    background-size: 28px 28px;
    pointer-events: none; z-index: 0;
  }

  /* ── Particles ── */
  .particles { position: fixed; inset: 0; pointer-events: none; z-index: 1; overflow: hidden; }
  .particle {
    position: absolute; border-radius: 50%; opacity: 0;
    animation: floatUp var(--dur) linear var(--delay) infinite;
  }
  @keyframes floatUp {
    0%   { transform: translateY(100vh) translateX(0); opacity: 0; }
    8%   { opacity: var(--op, .5); }
    92%  { opacity: var(--op, .3); }
    100% { transform: translateY(-60px) translateX(var(--dx)); opacity: 0; }
  }

  /* ── Ambient orbs ── */
  .orb { position: fixed; border-radius: 50%; filter: blur(100px); pointer-events: none; z-index: 0; }
  .orb1 { width: 480px; height: 480px; top: -180px; left: -120px; background: rgba(201,168,76,.06); animation: orb1 20s ease-in-out infinite alternate; }
  .orb2 { width: 380px; height: 380px; bottom: -120px; right: -80px;  background: rgba(124,92,191,.05); animation: orb2 25s ease-in-out infinite alternate; }
  @keyframes orb1 { to { transform: translate(50px, 70px); } }
  @keyframes orb2 { to { transform: translate(-40px, -50px); } }

  /* ── Page ── */
  .page {
    position: relative; z-index: 10;
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 48px 16px 72px;
  }

  /* ── Header ── */
  header { text-align: center; margin-bottom: 44px; animation: fadeDown .7s ease both; }

  .logo-wrap { display: inline-flex; flex-direction: column; align-items: center; gap: 10px; }

  .logo-icon {
    width: 52px; height: 52px;
    background: linear-gradient(135deg, var(--gold-dim), var(--gold), var(--gold-light));
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.5rem;
    box-shadow: 0 0 24px rgba(201,168,76,.2), 0 4px 16px rgba(0,0,0,.4);
    animation: iconPulse 4s ease-in-out infinite;
  }
  @keyframes iconPulse { 0%,100%{ box-shadow: 0 0 24px rgba(201,168,76,.2), 0 4px 16px rgba(0,0,0,.4); } 50%{ box-shadow: 0 0 40px rgba(201,168,76,.35), 0 4px 20px rgba(0,0,0,.4); } }

  .logo-title {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(1.8rem, 5vw, 2.5rem);
    font-weight: 400;
    letter-spacing: .04em;
    background: linear-gradient(135deg, var(--gold-dim) 0%, var(--gold-light) 50%, var(--gold) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .logo-sub {
    font-size: .72rem;
    font-weight: 500;
    letter-spacing: .28em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  /* ── Card ── */
  .card {
    width: 100%; max-width: 460px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 32px 28px;
    position: relative; overflow: hidden;
    box-shadow:
      0 0 0 1px rgba(255,255,255,.03) inset,
      0 24px 60px rgba(0,0,0,.5),
      0 2px 8px rgba(0,0,0,.3);
    animation: fadeUp .8s ease both .1s;
  }

  /* Gold top line */
  .card::before {
    content: '';
    position: absolute; top: 0; left: 15%; right: 15%; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity: .5;
    animation: topline 4s ease-in-out infinite;
  }
  @keyframes topline { 0%,100%{ opacity: .3; } 50%{ opacity: .7; } }

  /* ── Section label ── */
  .section-label {
    display: flex; align-items: center; gap: 10px;
    font-size: .65rem;
    font-weight: 600;
    letter-spacing: .3em;
    text-transform: uppercase;
    color: var(--gold-dim);
    margin-bottom: 18px;
  }
  .section-label svg { width: 14px; height: 14px; opacity: .7; }
  .section-label::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, var(--border2), transparent); }

  /* ── Mail display box ── */
  .mail-box {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 14px;
    padding: 20px 20px;
    cursor: pointer;
    position: relative; overflow: hidden;
    transition: border-color .25s, box-shadow .25s;
    min-height: 70px;
    display: flex; align-items: center;
  }
  .mail-box:hover { border-color: rgba(224,92,122,.35); box-shadow: 0 0 20px rgba(224,92,122,.08); }
  .mail-box::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(105deg, transparent 40%, rgba(224,92,122,.04) 100%);
    pointer-events: none;
  }

  .mail-text {
    font-family: 'Inter', monospace;
    font-size: clamp(.72rem, 2.2vw, .85rem);
    font-weight: 500;
    color: var(--text);
    letter-spacing: .03em;
    word-break: break-all;
    line-height: 1.5;
  }
  .mail-placeholder {
    font-size: .82rem;
    font-weight: 400;
    color: var(--text-dim);
    font-style: italic;
    font-family: 'DM Sans', sans-serif;
  }

  /* ── Domain chips ── */
  .domain-row {
    display: flex; flex-wrap: wrap; gap: 7px;
    margin-top: 14px;
  }
  .chip {
    font-size: .7rem;
    font-weight: 500;
    letter-spacing: .04em;
    padding: 5px 13px;
    border-radius: 50px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    transition: all .2s;
    font-family: 'Inter', sans-serif;
  }
  .chip:hover { border-color: rgba(201,168,76,.35); color: var(--gold-light); background: rgba(201,168,76,.06); }
  .chip.active { border-color: rgba(201,168,76,.5); color: var(--gold-light); background: rgba(201,168,76,.1); }

  /* ── Buttons row ── */
  .btn-row { display: flex; gap: 10px; margin-top: 16px; }

  .btn {
    flex: 1;
    padding: 13px 18px;
    border: none; border-radius: 12px;
    font-family: 'Inter', sans-serif;
    font-size: .82rem;
    font-weight: 600;
    letter-spacing: .05em;
    cursor: pointer;
    position: relative; overflow: hidden;
    transition: all .25s;
    text-transform: uppercase;
    display: flex; align-items: center; justify-content: center; gap: 7px;
  }
  .btn::after { content: ''; position: absolute; inset: 0; background: rgba(255,255,255,0); transition: background .2s; }
  .btn:hover::after { background: rgba(255,255,255,.07); }
  .btn:active { transform: scale(.97); }

  .btn-generate {
    background: linear-gradient(135deg, var(--rose-dim) 0%, var(--rose) 60%, var(--rose-light) 100%);
    color: #fff;
    box-shadow: 0 4px 20px rgba(224,92,122,.25);
  }
  .btn-generate:hover { box-shadow: 0 4px 28px rgba(224,92,122,.45); }

  .btn-copy {
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--text-muted);
    flex: 0 0 auto;
    box-shadow: none;
  }
  .btn-copy:hover { border-color: rgba(124,92,191,.45); color: var(--violet-light); box-shadow: 0 0 14px rgba(124,92,191,.15); }
  .btn-copy.copied { border-color: rgba(76,175,130,.5); color: var(--success); background: rgba(76,175,130,.08); }

  /* ── Counter ── */
  .counter {
    margin-top: 10px;
    font-size: .68rem;
    font-weight: 500;
    letter-spacing: .1em;
    color: var(--text-dim);
    text-align: right;
    display: flex; align-items: center; justify-content: flex-end; gap: 6px;
  }
  .dot-live {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--success);
    box-shadow: 0 0 6px var(--success);
    animation: blink 2.4s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{ opacity: 1; } 50%{ opacity: .25; } }

  /* ── Note box ── */
  .note {
    margin-top: 14px;
    background: rgba(255,255,255,.02);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: .75rem;
    color: var(--text-dim);
    line-height: 1.65;
    font-family: 'DM Sans', sans-serif;
  }

  /* ── Divider ── */
  .divider {
    display: flex; align-items: center; gap: 14px;
    margin: 28px 0;
    color: var(--text-dim); font-size: .65rem;
    letter-spacing: .2em; text-transform: uppercase;
  }
  .divider-line { flex: 1; height: 1px; background: var(--border); }

  /* ── Destination button ── */
  .dest-btn {
    width: 100%;
    padding: 18px 24px;
    border: none; border-radius: 14px;
    font-family: 'DM Serif Display', serif;
    font-size: clamp(.95rem, 3vw, 1.15rem);
    font-weight: 400;
    letter-spacing: .04em;
    cursor: pointer;
    position: relative; overflow: hidden;
    color: #fff;
    background: linear-gradient(135deg, #B5436A 0%, var(--rose) 45%, #F08CA5 100%);
    box-shadow: 0 6px 30px rgba(224,92,122,.3), 0 2px 8px rgba(0,0,0,.3), inset 0 1px 0 rgba(255,255,255,.15);
    transition: all .3s;
    display: flex; align-items: center; justify-content: center; gap: 10px;
  }
  /* Shine sweep */
  .dest-btn::before {
    content: '';
    position: absolute;
    top: -50%; left: -70%;
    width: 35%; height: 200%;
    background: rgba(255,255,255,.12);
    transform: skewX(-20deg);
    animation: shine 3.5s linear infinite;
  }
  @keyframes shine { 0%{ left: -70%; } 100%{ left: 140%; } }
  .dest-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 36px rgba(224,92,122,.5), 0 2px 8px rgba(0,0,0,.3); }
  .dest-btn:active { transform: translateY(0) scale(.98); }
  .dest-arrow { display: inline-block; transition: transform .3s; }
  .dest-btn:hover .dest-arrow { transform: translateX(5px); }

  /* ── Pulse ring ── */
  .pulse-ring {
    position: absolute; inset: -2px; border-radius: 16px;
    border: 1px solid rgba(224,92,122,.5);
    animation: pulseOut 1.4s ease-out forwards;
    pointer-events: none;
  }
  @keyframes pulseOut { to { inset: -14px; opacity: 0; } }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 32px; left: 50%;
    transform: translateX(-50%) translateY(70px);
    background: var(--surface);
    border: 1px solid var(--border2);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: .78rem;
    font-weight: 500;
    letter-spacing: .04em;
    padding: 11px 22px;
    border-radius: 50px;
    box-shadow: 0 8px 30px rgba(0,0,0,.5), 0 0 0 1px rgba(201,168,76,.1);
    opacity: 0;
    transition: transform .4s cubic-bezier(.34,1.56,.64,1), opacity .35s;
    z-index: 999; white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  /* ── Animations ── */
  @keyframes fadeDown { from { opacity: 0; transform: translateY(-18px); } to { opacity: 1; } }
  @keyframes fadeUp   { from { opacity: 0; transform: translateY(18px); }  to { opacity: 1; } }

  /* ── Spin icon ── */
  .spin-anim { display: inline-block; }
  @keyframes spinOnce { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- Orbs -->
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<!-- Particles -->
<div class="particles" id="particles"></div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<div class="page">

  <!-- Header -->
  <header>
    <div class="logo-wrap">
      <div class="logo-icon">♥︎</div>
      <div class="logo-title">Gold Tool</div>
      <div class="logo-sub">Mail &amp; Navigation</div>
    </div>
  </header>

  <!-- Card -->
  <div class="card">

    <!-- ══ Fast Mail ══ -->
    <div class="section-label">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
      TempMail Generator
    </div>

    <!-- Mail display -->
    <div class="mail-box" id="mailDisplay" onclick="copyMail()">
      <span class="mail-text" id="mailText">
        <span class="mail-placeholder">Nhấn tạo để sinh email ngay…</span>
      </span>
    </div>

    <!-- Domain chips -->
    <div class="domain-row" id="domainRow">
      <span class="chip active" data-domain="guerrillamail.com">guerrilla</span>
      <span class="chip" data-domain="mailnator.com">mailnator</span>
      <span class="chip" data-domain="yopmail.com">yopmail</span>
      <span class="chip" data-domain="tempmail.com">tempmail</span>
      <span class="chip" data-domain="sharklasers.com">sharklasers</span>
    </div>

    <!-- Buttons -->
    <div class="btn-row">
      <button class="btn btn-generate" id="generateBtn" onclick="generateMail(event)">
        <span class="spin-anim" id="genIcon">⚡</span>
        Tạo
      </button>
      <button class="btn btn-copy" id="copyBtn" onclick="copyMail(event)">
        <span id="copyIcon">📋</span>
        <span id="copyLabel">Copy</span>
      </button>
    </div>

    <div class="counter">
      <span class="dot-live"></span>
      Đã tạo: <span id="genCount">0</span> địa chỉ
    </div>

    <div class="note">
      Chọn domain rồi nhấn <strong style="color:var(--text-muted)">Tạo Fast Mail</strong>. Nhấn vào ô email hoặc nút <strong style="color:var(--text-muted)">Copy</strong> để sao chép.
    </div>

    <!-- Divider -->
    <div class="divider">
      <div class="divider-line"></div>
      <span>Trang đích</span>
      <div class="divider-line"></div>
    </div>

    <!-- ══ Destination ══ -->
    <button class="dest-btn" id="destBtn" onclick="goToDestination()">
      Nhấn vào đến trang đích
      <span class="dest-arrow">→</span>
    </button>

  </div>
</div>

<script>
// ── Particles ──
const pc = document.getElementById('particles');
const colors = ['rgba(201,168,76,.6)','rgba(224,92,122,.5)','rgba(124,92,191,.5)','rgba(255,255,255,.2)'];
for (let i = 0; i < 18; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  const size = .8 + Math.random() * 1.6;
  p.style.cssText = `
    left:${Math.random()*100}%;
    width:${size}px; height:${size}px;
    background:${colors[Math.floor(Math.random()*colors.length)]};
    --dur:${9+Math.random()*12}s;
    --delay:-${Math.random()*14}s;
    --dx:${(Math.random()-.5)*70}px;
    --op:${.2+Math.random()*.4};
  `;
  pc.appendChild(p);
}

// ── Toast ──
function toast(msg, dur = 2200) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._tid);
  t._tid = setTimeout(() => t.classList.remove('show'), dur);
}

// ── Domain ──
let activeDomain = 'guerrillamail.com';
document.querySelectorAll('.chip').forEach(c => {
  c.addEventListener('click', () => {
    document.querySelectorAll('.chip').forEach(x => x.classList.remove('active'));
    c.classList.add('active');
    activeDomain = c.dataset.domain;
    toast(`Domain: @${activeDomain}`);
  });
});

// ── Mail generation ──
let genCount = 0, currentMail = '';
const adj  = ['fast','neon','cyber','turbo','ultra','dark','storm','quick','alpha','ghost','shadow','hyper','flux','nova','prime','swift','razor','delta','sigma','omega'];
const noun = ['bolt','wave','core','link','node','gate','sync','dash','flow','grid','echo','pulse','edge','unit','zone','byte','data','loop','path','root'];

function generateMail(e) {
  if (e) e.stopPropagation();
  const prefix = adj[Math.floor(Math.random()*adj.length)] + noun[Math.floor(Math.random()*noun.length)] + Math.floor(100+Math.random()*8900);
  currentMail = prefix + '@' + activeDomain;
  document.getElementById('mailText').textContent = currentMail;
  genCount++;
  document.getElementById('genCount').textContent = genCount;

  // Reset copy btn
  resetCopyBtn();

  // Pulse ring
  const box = document.getElementById('mailDisplay');
  const ring = document.createElement('div');
  ring.className = 'pulse-ring';
  box.appendChild(ring);
  setTimeout(() => ring.remove(), 1400);

  // Icon spin
  const icon = document.getElementById('genIcon');
  icon.style.animation = 'none';
  void icon.offsetWidth;
  icon.style.animation = 'spinOnce .45s ease-out';

  toast(`✦ ${currentMail}`);
}

function resetCopyBtn() {
  const btn = document.getElementById('copyBtn');
  btn.classList.remove('copied');
  document.getElementById('copyIcon').textContent = '📋';
  document.getElementById('copyLabel').textContent = 'Copy';
}

function copyMail(e) {
  if (e) e.stopPropagation();
  if (!currentMail) { generateMail(null); return; }

  const doCopy = () => {
    const btn = document.getElementById('copyBtn');
    btn.classList.add('copied');
    document.getElementById('copyIcon').textContent = '✓';
    document.getElementById('copyLabel').textContent = 'Copied';
    toast('📋 Đã sao chép email!');
    setTimeout(resetCopyBtn, 2500);
  };

  navigator.clipboard.writeText(currentMail)
    .then(doCopy)
    .catch(() => {
      const ta = document.createElement('textarea');
      ta.value = currentMail;
      document.body.appendChild(ta); ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      doCopy();
    });
}

// ── Destination (hardcoded) ──
const DEST_URL = 'https://nextdns.io/';

function goToDestination() {
  const btn = document.getElementById('destBtn');
  btn.style.transform = 'scale(.97)';
  setTimeout(() => btn.style.transform = '', 200);
  toast('🚀 Đang chuyển hướng…');
  setTimeout(() => window.open(DEST_URL, '_blank'), 500);
}
</script>
</body>
</html>
